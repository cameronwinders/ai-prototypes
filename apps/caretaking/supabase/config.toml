project_id = "shared-caretaking-mvp"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://caretakingapp.com"
additional_redirect_urls = [
  "https://caretakingapp.com/api/auth/callback",
  "https://shared-caretaking-mvp.vercel.app/api/auth/callback",
  "http://localhost:3000/api/auth/callback"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "10s"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
